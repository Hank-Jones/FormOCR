<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormOCR</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon-128.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: #070b12;
        color: #cbd5e1;
        font-family: "PRK P Gothic", system-ui, sans-serif;
      }
      #boot-fallback {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }
      #boot-fallback img {
        width: min(200px, 70vw);
        height: auto;
        padding: 0.75rem 1rem;
        background: #fff;
        border-radius: 8px;
      }
      #boot-fallback span {
        opacity: 0.75;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" aria-live="polite">
        <img src="/brand/logo.png" alt="FormOCR" width="200" height="80" />
        <span>Starting…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
